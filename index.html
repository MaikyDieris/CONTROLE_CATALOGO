    <script>
        (function() {
            // ============================================================

            const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvyfBtZ2VN6w_xJL2BHEUNHfXiESTGlM-pPHpvx8RgP8scaAO_E76FwGJMzXG2aHgd/exec';
            const SHEET_ID = '1MEghTuBZnbkddvgNsJ2Mi2DwebHyMmGG-Xir4TGtQm0';
            const POLL_INTERVAL = 10000; // 10 segundos

            // ============================================================
            // ESTADO GLOBAL
            // ============================================================
            let retainers = [], bearings = [], reducers = [], cart = [];
            let nextRetainerId = 1, nextBearingId = 1, nextReducerId = 1;
            let currentUser = null, currentVersion = 0, pollingEnabled = true;

            // ============================================================
            // USUÁRIOS
            // ============================================================
            const MASTER_USER = 'Maiky', MASTER_PASS = 'Dieris';
            function loadUsers() {
                let saved = localStorage.getItem('app_users');
                let users = saved ? JSON.parse(saved) : [];
                if (!users.find(u => u.username === MASTER_USER)) users.push({ username: MASTER_USER, password: MASTER_PASS, level: 'master' });
                else { const m = users.find(u => u.username === MASTER_USER); m.password = MASTER_PASS; m.level = 'master'; }
                if (!users.find(u => u.username === 'visitante')) users.push({ username: 'visitante', password: 'visitante123', level: 'user' });
                localStorage.setItem('app_users', JSON.stringify(users));
                return users;
            }
            let users = loadUsers();

            // ============================================================
            // PERSISTÊNCIA (com versionamento)
            // ============================================================
            async function getVersionFromSheet() {
                try {
                    const resp = await fetch(`${APP_SCRIPT_URL}?action=version&sheetId=${SHEET_ID}&t=${Date.now()}`);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const result = await resp.json();
                    return result.status === 'ok' ? (result.version || 0) : 0;
                } catch { return currentVersion; }
            }

            async function loadDataFromSheet() {
                try {
                    const resp = await fetch(`${APP_SCRIPT_URL}?action=load&sheetId=${SHEET_ID}&t=${Date.now()}`);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const result = await resp.json();
                    if (result.status === 'ok') {
                        currentVersion = result.version || 0;
                        return result.data;
                    }
                    throw new Error(result.message);
                } catch (e) { console.error('Load error:', e); return null; }
            }

            async function saveDataToSheet(data) {
                try {
                    const payload = { action: 'save', sheetId: SHEET_ID, data: JSON.stringify(data) };
                    const formData = new FormData();
                    for (let k in payload) formData.append(k, payload[k]);
                    const resp = await fetch(APP_SCRIPT_URL, { method: 'POST', body: formData });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const result = await resp.json();
                    if (result.status === 'ok') {
                        if (result.version) currentVersion = result.version;
                        return true;
                    }
                    throw new Error(result.message);
                } catch (e) {
                    console.error('Save error:', e);
                    alert('Erro ao salvar: ' + e.message);
                    return false;
                }
            }

            async function saveData() {
                const ok = await saveDataToSheet({ retainers, bearings, reducers, cart, nextRetainerId, nextBearingId, nextReducerId });
                if (ok) {
                    document.getElementById('syncStatus').textContent = '✅ Sincronizado';
                    setTimeout(() => document.getElementById('syncStatus').textContent = '🔄 Sincronizado', 2000);
                }
                return ok;
            }

            // ============================================================
            // AUTO-SYNC (POLLING)
            // ============================================================
            async function checkForUpdates() {
                if (!pollingEnabled || !currentUser) return;
                try {
                    const remoteVersion = await getVersionFromSheet();
                    if (remoteVersion !== currentVersion) {
                        document.getElementById('syncStatus').textContent = '🔄 Atualizando...';
                        await refreshData();
                        document.getElementById('syncStatus').textContent = '✅ Atualizado';
                        setTimeout(() => document.getElementById('syncStatus').textContent = '🔄 Sincronizado', 2000);
                    }
                } catch (e) { console.warn('Polling error:', e); }
            }

            async function refreshData() {
                const data = await loadDataFromSheet();
                if (data) {
                    retainers = data.retainers || [];
                    bearings = data.bearings || [];
                    reducers = data.reducers || [];
                    cart = data.cart || [];
                    nextRetainerId = data.nextRetainerId || 1;
                    nextBearingId = data.nextBearingId || 1;
                    nextReducerId = data.nextReducerId || 1;
                    renderAllLists();
                    renderAllCarts();
                    updateDashboard();
                }
            }

            // ============================================================

            // ============================================================

                ],
                reducers: [
                    { id:1, name:'Redutor Planetário A10', manufacturer:'SEW', location:'Esteira Transportadora', bearings:['Rolamento 6001','Rolamento 6203'], retainers:['Retentor 20x35x7','Retentor 30x45x8'] },
                    { id:2, name:'Redutor WEG Cestari C06', manufacturer:'WEG Cestari', location:'Transportador de Correia', bearings:['Rolamento 6204','Rolamento 6205'], retainers:['Retentor 25x40x7','Retentor 35x50x10'] },
                    { id:3, name:'Redutor WEG Cestari C05', manufacturer:'WEG Cestari', location:'Elevador de Canecas', bearings:['Rolamento 6203','Rolamento 6204'], retainers:['Retentor 20x35x7','Retentor 30x45x8'] },
                    { id:4, name:'Redutor Geremia GO34', manufacturer:'Geremia', location:'Moinho de Martelo', bearings:['Rolamento 6305','Rolamento 6306'], retainers:['Retentor 35x50x10','Retentor 40x55x10'] },
                    { id:5, name:'Redutor Geremia GO29', manufacturer:'Geremia', location:'Agitador Industrial', bearings:['Rolamento 6304','Rolamento 6206'], retainers:['Retentor 25x40x7'] }
                ],
                nextRetainerId: 31, nextBearingId: 33, nextReducerId: 6
            };

            // ============================================================
            // AUXILIARES
            // ============================================================
            function escapeHtml(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
            function generateRetentorName(m) { if (!m) return 'Retentor sem medida'; let c=String(m).replace(/mm/gi,'').trim().replace(/\s*x\s*/g,'x').replace(/\s+/g,''); return 'Retentor '+(c||'sem medida'); }
            function isMaster() { return currentUser && currentUser.level === 'master'; }
            function cartTotalQty() { return cart.reduce((s,i) => s + i.quantity, 0); }
            function cleanCart() {
                cart = cart.filter(i => {
                    if (i.category === 'retentor') return retainers.some(r => r.id === i.itemId);
                    if (i.category === 'rolamento') return bearings.some(b => b.id === i.itemId);
                    if (i.category === 'redutor') return reducers.some(rd => rd.id === i.itemId);
                    return false;
                });
            }
            function getCurrentList(cat) {
                if (cat === 'retentor') return retainers;
                if (cat === 'rolamento') return bearings;
                if (cat === 'redutor') return reducers;
                return [];
            }
            function getItemById(id, cat) { return getCurrentList(cat).find(i => i.id === id); }
            function activeCategory() {
                const active = document.querySelector('.page.active');
                if (!active) return 'retentor';
                const id = active.id;
                if (id === 'page-retentores') return 'retentor';
                if (id === 'page-rolamentos') return 'rolamento';
                if (id === 'page-redutores') return 'redutor';
                return 'retentor';
            }

            // ============================================================
            // RENDERIZAÇÃO (CORRIGIDA – conversão segura para string)
            // ============================================================
            function renderList(containerId, list, type, searchInputId) {
                const container = document.getElementById(containerId);
                if (!container) return;
                const search = document.getElementById(searchInputId);
                const q = search ? search.value.toLowerCase() : '';
                const master = isMaster();
                // Filtro com conversão segura
                const filtered = list.filter(item => {
                    if (!item) return false;
                    // Converter todos os campos para string antes de usar toLowerCase
                    const name = String(item.name || '').toLowerCase();
                    const measures = String(item.measures || '').toLowerCase();
                    if (type === 'redutor') {
                        const mf = String(item.manufacturer || '').toLowerCase();
                        const loc = String(item.location || '').toLowerCase();
                        const bs = (item.bearings || []).join(' ').toLowerCase();
                        const rs = (item.retainers || []).join(' ').toLowerCase();
                        return name.includes(q) || mf.includes(q) || loc.includes(q) || bs.includes(q) || rs.includes(q);
                    }
                    return name.includes(q) || measures.includes(q);
                });
                if (!filtered.length) { container.innerHTML = '<div class="no-results">🔍 Nenhum resultado encontrado.</div>'; return; }
                container.innerHTML = filtered.map(item => {
                    if (type === 'redutor') {
                        return `<div class="item-card">
                            <div class="card-name card-name-clickable" onclick="window._openReducerDetail(${item.id})">${escapeHtml(item.name)}</div>
                            <div class="card-info">🏭 ${escapeHtml(item.manufacturer)}</div>
                            <div class="card-info">📍 ${escapeHtml(item.location)}</div>
                            <div class="card-actions">
                                <button class="btn btn-cart" data-action="add" data-id="${item.id}" data-category="redutor">🛒 Carrinho</button>
                                ${master ? `<button class="btn btn-edit" data-action="edit" data-id="${item.id}" data-category="redutor">✏️ Editar</button><button class="btn btn-remove" data-action="remove" data-id="${item.id}" data-category="redutor">🗑️ Remover</button>` : ''}
                            </div>
                        </div>`;
                    } else {
                        return `<div class="item-card">
                            <div class="card-name">${escapeHtml(item.name)}</div>
                            <div class="card-info">📏 ${escapeHtml(item.measures)}</div>
                            <div class="card-actions">
                                <button class="btn btn-cart" data-action="add" data-id="${item.id}" data-category="${type}">🛒 Carrinho</button>
                                ${master ? `<button class="btn btn-edit" data-action="edit" data-id="${item.id}" data-category="${type}">✏️ Editar</button><button class="btn btn-remove" data-action="remove" data-id="${item.id}" data-category="${type}">🗑️ Remover</button>` : ''}
                            </div>
                        </div>`;
                    }
                }).join('');
                container.querySelectorAll('.btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const action = this.dataset.action;
                        const id = parseInt(this.dataset.id);
                        const cat = this.dataset.category || activeCategory();
                        if (action === 'add') addToCart(id, cat);
                        else if (action === 'edit') openEditModal(id, cat);
                        else if (action === 'remove') removeItem(id, cat);
                    });
                });
            }

            function renderAllLists() {
                renderList('listRetentores', retainers, 'retentor', 'searchRetentores');
                renderList('listRolamentos', bearings, 'rolamento', 'searchRolamentos');
                renderList('listRedutores', reducers, 'redutor', 'searchRedutores');
            }

            function renderAllCarts() {
                cleanCart();
                const total = cartTotalQty();
                document.querySelectorAll('.cart-badge').forEach(el => el.textContent = total);
                document.getElementById('cartTotalPage').textContent = `Total de itens: ${total}`;
                document.getElementById('cartTotalSidebar').textContent = `Total: ${total}`;
                document.getElementById('btnWhatsAppPage').disabled = total === 0;
                document.getElementById('btnWhatsAppSidebar').disabled = total === 0;

                const renderCartItems = (containerId) => {
                    const container = document.getElementById(containerId);
                    if (!container) return;
                    if (!cart.length) { container.innerHTML = '<div class="cart-empty">📦 Seu carrinho está vazio</div>'; return; }
                    container.innerHTML = cart.map(ci => {
                        const item = getItemById(ci.itemId, ci.category);
                        if (!item) return '';
                        let measuresText = '';
                        if (ci.category === 'retentor' || ci.category === 'rolamento') {
                            measuresText = `📏 ${escapeHtml(item.measures)}`;
                        } else {
                            measuresText = `🏭 ${escapeHtml(item.manufacturer)} | 📍 ${escapeHtml(item.location)}<br>⚙️ ${(item.bearings||[]).join(', ')}<br>🔩 ${(item.retainers||[]).join(', ')}`;
                        }
                        return `<div class="cart-item">
                            <div class="cart-item-name">${escapeHtml(item.name)}</div>
                            <div class="cart-item-measures">${measuresText}</div>
                            <div class="cart-item-controls">
                                <input type="number" class="qty-input" value="${ci.quantity}" min="1" data-category="${ci.category}" data-id="${ci.itemId}">
                                <button class="btn-remove-cart" data-category="${ci.category}" data-id="${ci.itemId}">🗑️ Remover</button>
                            </div>
                        </div>`;
                    }).join('');
                    container.querySelectorAll('.qty-input').forEach(inp => {
                        inp.addEventListener('change', function() {
                            const cat = this.dataset.category, id = parseInt(this.dataset.id);
                            let qty = parseInt(this.value);
                            if (isNaN(qty) || qty < 1) { qty = 1; this.value = 1; }
                            updateCartQty(cat, id, qty);
                        });
                    });
                    container.querySelectorAll('.btn-remove-cart').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const cat = this.dataset.category, id = parseInt(this.dataset.id);
                            cart = cart.filter(i => !(i.category === cat && i.itemId === id));
                            renderAllCarts();
                            saveData();
                        });
                    });
                };
                renderCartItems('cartItemsPage');
                renderCartItems('cartItemsSidebar');
            }

            function updateDashboard() {
                document.getElementById('dashRetentores').textContent = retainers.length;
                document.getElementById('dashRolamentos').textContent = bearings.length;
                document.getElementById('dashRedutores').textContent = reducers.length;
                document.getElementById('dashCarrinho').textContent = cartTotalQty();
            }

            // ============================================================
            // AÇÕES
            // ============================================================
            async function addToCart(itemId, category) {
                const existing = cart.find(i => i.itemId === itemId && i.category === category);
                if (existing) existing.quantity++;
                else cart.push({ category, itemId, quantity: 1 });
                renderAllCarts();
                await saveData();
                pulseBadge();
            }

            async function updateCartQty(cat, id, qty) {
                const item = cart.find(i => i.category === cat && i.itemId === id);
                if (item) item.quantity = Math.max(1, qty);
                renderAllCarts();
                await saveData();
            }

            async function removeItem(itemId, category) {
                if (!isMaster()) return;
                const list = getCurrentList(category);
                const item = list.find(i => i.id === itemId);
                if (!item || !confirm(`Remover "${item.name}"?`)) return;
                if (category === 'retentor') retainers = retainers.filter(i => i.id !== itemId);
                else if (category === 'rolamento') bearings = bearings.filter(i => i.id !== itemId);
                else if (category === 'redutor') reducers = reducers.filter(i => i.id !== itemId);
                cart = cart.filter(i => !(i.category === category && i.itemId === itemId));
                renderAllLists();
                renderAllCarts();
                updateDashboard();
                await saveData();
            }

            function pulseBadge() {
                document.querySelectorAll('.cart-badge').forEach(el => {
                    el.style.transform = 'scale(1.3)';
                    setTimeout(() => el.style.transform = '', 150);
                });
            }

            function sendWhatsApp() {
                cleanCart();
                if (!cart.length) { alert('Carrinho vazio.'); return; }
                let msg = '🛒 *Carrinho de Itens*\n\n';
                cart.forEach((ci, idx) => {
                    const item = getItemById(ci.itemId, ci.category);
                    if (!item) return;
                    msg += `📦 *${item.name}*\n`;
                    if (ci.category === 'redutor') {
                        msg += `   Fabricante: ${item.manufacturer}\n   Local: ${item.location}\n   Rolamentos: ${(item.bearings||[]).join(', ')}\n   Retentores: ${(item.retainers||[]).join(', ')}\n`;
                    } else {
                        msg += `   Medidas: ${item.measures}\n`;
                    }
                    msg += `   Quantidade: ${ci.quantity}\n`;
                    if (idx < cart.length - 1) msg += '\n';
                });
                msg += `\n📊 *Total de itens: ${cartTotalQty()}*`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }

            // ============================================================
            // MODAL ADICIONAR/EDITAR (idêntico ao anterior)
            // ============================================================
            let modalMode = 'add', editingItemId = null, editingCategory = null;
            const modalOverlay = document.getElementById('modalOverlay');
            let categorySelect, retentorFields, rolamentoFields, redutorFields;
            let inputMeasuresRet, inputNameRol, inputMeasuresRol;
            let inputRedutorName, inputFabricante, inputLocal;
            let inputRolamentosAssoc, inputRetentoresAssoc, namePreviewText, btnSave, btnCancel;

            function createModal(title, category, item) {
                modalOverlay.innerHTML = `<div class="modal"><h3>${title}</h3>
                    <div class="form-group"><label for="categorySelect">Tipo</label>
                    <select id="categorySelect"><option value="retentor">Retentor</option><option value="rolamento">Rolamento</option><option value="redutor">Redutor</option></select></div>
                    <div id="retentorFields"><div class="name-preview">📌 Nome gerado: <strong id="namePreviewText">Retentor ...</strong></div>
                    <div class="form-group"><label for="inputMeasuresRet">Medida</label><input type="text" id="inputMeasuresRet" placeholder="Ex: 20 x 35 x 7 mm"></div></div>
                    <div id="rolamentoFields" style="display:none;"><div class="form-group"><label for="inputNameRol">Nome</label><input type="text" id="inputNameRol"></div>
                    <div class="form-group"><label for="inputMeasuresRol">Medidas</label><input type="text" id="inputMeasuresRol"></div></div>
                    <div id="redutorFields" style="display:none;"><div class="form-group"><label for="inputRedutorName">Nome</label><input type="text" id="inputRedutorName"></div>
                    <div class="form-group"><label for="inputFabricante">Fabricante</label><input type="text" id="inputFabricante"></div>
                    <div class="form-group"><label for="inputLocal">Local</label><input type="text" id="inputLocal"></div>
                    <div class="form-group"><label for="inputRolamentosAssoc">Rolamentos</label><textarea id="inputRolamentosAssoc"></textarea></div>
                    <div class="form-group"><label for="inputRetentoresAssoc">Retentores</label><textarea id="inputRetentoresAssoc"></textarea></div></div>
                    <div class="modal-actions"><button class="btn-cancel" id="btnCancel">Cancelar</button><button class="btn-save" id="btnSave">💾 Salvar</button></div></div>`;

                categorySelect = document.getElementById('categorySelect');
                retentorFields = document.getElementById('retentorFields');
                rolamentoFields = document.getElementById('rolamentoFields');
                redutorFields = document.getElementById('redutorFields');
                inputMeasuresRet = document.getElementById('inputMeasuresRet');
                inputNameRol = document.getElementById('inputNameRol');
                inputMeasuresRol = document.getElementById('inputMeasuresRol');
                inputRedutorName = document.getElementById('inputRedutorName');
                inputFabricante = document.getElementById('inputFabricante');
                inputLocal = document.getElementById('inputLocal');
                inputRolamentosAssoc = document.getElementById('inputRolamentosAssoc');
                inputRetentoresAssoc = document.getElementById('inputRetentoresAssoc');
                namePreviewText = document.getElementById('namePreviewText');
                btnSave = document.getElementById('btnSave');
                btnCancel = document.getElementById('btnCancel');

                if (category) {
                    categorySelect.value = category;
                    categorySelect.disabled = true;
                    toggleModalFields(category);
                    if (category === 'retentor' && item) { inputMeasuresRet.value = item.measures || ''; updateNamePreview(); }
                    else if (category === 'rolamento' && item) { inputNameRol.value = item.name || ''; inputMeasuresRol.value = item.measures || ''; }
                    else if (category === 'redutor' && item) {
                        inputRedutorName.value = item.name || '';
                        inputFabricante.value = item.manufacturer || '';
                        inputLocal.value = item.location || '';
                        inputRolamentosAssoc.value = (item.bearings||[]).join(', ');
                        inputRetentoresAssoc.value = (item.retainers||[]).join(', ');
                    }
                } else {
                    categorySelect.value = 'retentor';
                    categorySelect.disabled = false;
                    toggleModalFields('retentor');
                }

                btnCancel.addEventListener('click', () => modalOverlay.style.display = 'none');
                btnSave.addEventListener('click', saveModal);
                categorySelect.addEventListener('change', function() {
                    toggleModalFields(this.value);
                    if (this.value === 'retentor') updateNamePreview();
                });
                if (inputMeasuresRet) inputMeasuresRet.addEventListener('input', updateNamePreview);
                [inputMeasuresRet, inputNameRol, inputMeasuresRol, inputRedutorName, inputFabricante, inputLocal].forEach(inp => {
                    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); btnSave.click(); } });
                });
            }

            function toggleModalFields(cat) {
                if (retentorFields) retentorFields.style.display = cat === 'retentor' ? 'block' : 'none';
                if (rolamentoFields) rolamentoFields.style.display = cat === 'rolamento' ? 'block' : 'none';
                if (redutorFields) redutorFields.style.display = cat === 'redutor' ? 'block' : 'none';
            }

            function updateNamePreview() {
                if (namePreviewText) {
                    const m = inputMeasuresRet ? inputMeasuresRet.value.trim() : '';
                    namePreviewText.textContent = m ? generateRetentorName(m) : 'Retentor ...';
                }
            }

            function openEditModal(itemId, category) {
                if (!isMaster()) return;
                const item = getItemById(itemId, category);
                if (!item) return;
                modalMode = 'edit';
                editingItemId = itemId;
                editingCategory = category;
                createModal('Editar Item', category, item);
                modalOverlay.style.display = 'flex';
            }

            async function saveModal() {
                if (!isMaster()) return;
                const cat = categorySelect.value;
                try {
                    if (cat === 'retentor') {
                        const measures = inputMeasuresRet.value.trim();
                        if (!measures) { alert('Informe a medida.'); return; }
                        const name = generateRetentorName(measures);
                        if (modalMode === 'add') retainers.push({ id: nextRetainerId++, name, measures });
                        else { const item = getItemById(editingItemId, cat); if (item) { item.name = name; item.measures = measures; } }
                    } else if (cat === 'rolamento') {
                        const name = inputNameRol.value.trim(), measures = inputMeasuresRol.value.trim();
                        if (!name || !measures) { alert('Preencha todos os campos.'); return; }
                        if (modalMode === 'add') bearings.push({ id: nextBearingId++, name, measures });
                        else { const item = getItemById(editingItemId, cat); if (item) { item.name = name; item.measures = measures; } }
                    } else {
                        const name = inputRedutorName.value.trim();
                        const manufacturer = inputFabricante.value.trim();
                        const location = inputLocal.value.trim();
                        const blist = inputRolamentosAssoc.value.split(',').map(s=>s.trim()).filter(Boolean);
                        const rlist = inputRetentoresAssoc.value.split(',').map(s=>s.trim()).filter(Boolean);
                        if (!name || !manufacturer || !location) { alert('Preencha todos os campos.'); return; }
                        if (modalMode === 'add') reducers.push({ id: nextReducerId++, name, manufacturer, location, bearings: blist, retainers: rlist });
                        else { const item = getItemById(editingItemId, cat); if (item) { item.name = name; item.manufacturer = manufacturer; item.location = location; item.bearings = blist; item.retainers = rlist; } }
                    }
                    modalOverlay.style.display = 'none';
                    renderAllLists();
                    renderAllCarts();
                    updateDashboard();
                    await saveData();
                } catch (e) {
                    alert('Erro ao salvar: ' + e.message);
                }
            }

            // ============================================================
            // NAVEGAÇÃO
            // ============================================================
            function navigateTo(page) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const target = document.getElementById('page-' + page);
                if (target) target.classList.add('active');
                document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
                const link = document.querySelector(`.sidebar-nav a[data-page="${page}"]`);
                if (link) link.classList.add('active');
                if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                if (page === 'admin') renderAdminPanelPage();
                if (page === 'carrinho') renderAllCarts();
                if (page === 'dashboard') updateDashboard();
            }

            // ============================================================
            // ADMIN
            // ============================================================
            function renderAdminPanelPage() {
                const container = document.getElementById('adminUserListPage');
                users = loadUsers();
                let html = `<table class="user-table"><tr><th>Usuário</th><th>Nível</th><th>Ações</th></tr>`;
                users.forEach(u => {
                    const isMasterUser = (u.username === MASTER_USER);
                    html += `<tr><td>${escapeHtml(u.username)}</td><td>${u.level === 'master' ? 'Mestre' : 'Usuário'}</td>
                    <td>
                        <button class="btn-small btn-edit" onclick="window._renameUserPage('${escapeHtml(u.username)}')">Alterar nome</button>
                        <button class="btn-small btn-edit" onclick="window._resetPassPage('${escapeHtml(u.username)}')">Redefinir senha</button>
                        ${!isMasterUser ? `<button class="btn-small btn-remove" onclick="window._deleteUserPage('${escapeHtml(u.username)}')">Excluir</button>` : ''}
                    </td></tr>`;
                });
                html += '</table>';
                container.innerHTML = html;
                document.getElementById('btnAddUserPage').onclick = () => {
                    const u = document.getElementById('newUserPage').value.trim();
                    const p = document.getElementById('newPassPage').value.trim();
                    if (!u || !p) { alert('Preencha usuário e senha.'); return; }
                    users = loadUsers();
                    if (users.some(user => user.username === u)) { alert('Usuário já existe.'); return; }
                    users.push({ username: u, password: p, level: 'user' });
                    localStorage.setItem('app_users', JSON.stringify(users));
                    document.getElementById('newUserPage').value = '';
                    document.getElementById('newPassPage').value = '';
                    renderAdminPanelPage();
                };
            }

            window._renameUserPage = function(username) {
                const newName = prompt(`Novo nome para ${username}:`, username);
                if (newName && newName.trim()) {
                    users = loadUsers();
                    const user = users.find(u => u.username === username);
                    if (user) { user.username = newName.trim(); localStorage.setItem('app_users', JSON.stringify(users)); renderAdminPanelPage(); }
                }
            };
            window._resetPassPage = function(username) {
                const newPwd = prompt(`Nova senha para ${username}:`);
                if (newPwd) {
                    users = loadUsers();
                    const user = users.find(u => u.username === username);
                    if (user) { user.password = newPwd; localStorage.setItem('app_users', JSON.stringify(users)); alert('Senha redefinida.'); renderAdminPanelPage(); }
                }
            };
            window._deleteUserPage = function(username) {
                if (confirm(`Excluir usuário ${username}?`)) {
                    users = loadUsers();
                    users = users.filter(u => u.username !== username);
                    localStorage.setItem('app_users', JSON.stringify(users));
                    renderAdminPanelPage();
                }
            };

            // ============================================================
            // STATUS DO SERVIDOR
            // ============================================================
            async function checkServerStatus() {
                const dot = document.getElementById('statusDot'), text = document.getElementById('statusText');
                if (!dot || !text) { setTimeout(checkServerStatus, 2000); return; }
                try {
                    const resp = await fetch(`${APP_SCRIPT_URL}?action=ping&t=${Date.now()}`);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    if (data.status === 'ok') { dot.className = 'status-dot online'; text.textContent = 'Online'; }
                    else throw new Error('Resposta inválida');
                } catch { dot.className = 'status-dot offline'; text.textContent = 'Offline'; }
            }

            // ============================================================
            // DETALHES DO REDUTOR
            // ============================================================
            window._openReducerDetail = function(id) {
                const item = reducers.find(r => r.id === id);
                if (!item) return;
                document.getElementById('reducerDetailTitle').textContent = item.name;
                document.getElementById('reducerDetailContent').innerHTML = `
                    <p><strong>Fabricante:</strong> ${escapeHtml(item.manufacturer)}</p>
                    <p><strong>Local:</strong> ${escapeHtml(item.location)}</p>
                    <h4 style="margin-top:16px;">⚙️ Rolamentos (${(item.bearings||[]).length})</h4>
                    <ul>${(item.bearings||[]).map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
                    <h4 style="margin-top:12px;">🔩 Retentores (${(item.retainers||[]).length})</h4>
                    <ul>${(item.retainers||[]).map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>
                `;
                document.getElementById('reducerDetailModal').style.display = 'flex';
            };
            document.getElementById('btnCloseReducerDetail').addEventListener('click', () => {
                document.getElementById('reducerDetailModal').style.display = 'none';
            });
            document.getElementById('reducerDetailModal').addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });

            // ============================================================
            // LOGIN / LOGOUT
            // ============================================================
            function doLogin() {
                const u = document.getElementById('loginUser').value.trim();
                const p = document.getElementById('loginPass').value.trim();
                if (!u || !p) { document.getElementById('loginError').textContent = 'Preencha usuário e senha.'; return; }
                users = loadUsers();
                const found = users.find(user => user.username === u && user.password === p);
                if (!found) { document.getElementById('loginError').textContent = 'Usuário ou senha inválidos.'; return; }
                currentUser = { username: found.username, level: found.level };
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('userInfo').textContent = `👤 ${currentUser.username} (${currentUser.level === 'master' ? 'Mestre' : 'Usuário'})`;
                document.getElementById('sidebarAdmin').style.display = isMaster() ? 'flex' : 'none';
                checkServerStatus();
                initApp();
            }

            function doLogout() {
                currentUser = null;
                pollingEnabled = false;
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                document.getElementById('loginUser').value = '';
                document.getElementById('loginPass').value = '';
                document.getElementById('loginError').textContent = '';
                cart = [];
                renderAllCarts();
            }

            // ============================================================
            // INICIALIZAÇÃO
            // ============================================================
            async function initApp() {
                const data = await loadDataFromSheet();
                if (data) {
                    retainers = data.retainers || [];
                    bearings = data.bearings || [];
                    reducers = data.reducers || [];
                    cart = data.cart || [];
                    nextRetainerId = data.nextRetainerId || 1;
                    nextBearingId = data.nextBearingId || 1;
                    nextReducerId = data.nextReducerId || 1;
                } else {
                    retainers = defaultData.retainers;
                    bearings = defaultData.bearings;
                    reducers = defaultData.reducers;
                    cart = defaultData.cart || [];
                    nextRetainerId = defaultData.nextRetainerId;
                    nextBearingId = defaultData.nextBearingId;
                    nextReducerId = defaultData.nextReducerId;
                    await saveData();
                }
                renderAllLists();
                renderAllCarts();
                updateDashboard();
                navigateTo('dashboard');
                pollingEnabled = true;
                setInterval(checkForUpdates, POLL_INTERVAL);
                console.log('✅ Auto-sync ativado (polling a cada', POLL_INTERVAL/1000, 's)');
            }

            // ============================================================
            // EVENTOS
            // ============================================================
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('btnLogin').addEventListener('click', doLogin);
                document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
                document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
                document.getElementById('btnLogout').addEventListener('click', doLogout);

                document.getElementById('themeToggle').addEventListener('click', function() {
                    const dark = document.body.classList.toggle('dark');
                    document.body.classList.toggle('light');
                    this.textContent = dark ? '☀️' : '🌙';
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                });
                const savedTheme = localStorage.getItem('theme') || 'light';
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark');
                    document.body.classList.remove('light');
                    document.getElementById('themeToggle').textContent = '☀️';
                } else {
                    document.body.classList.add('light');
                    document.body.classList.remove('dark');
                    document.getElementById('themeToggle').textContent = '🌙';
                }

                document.getElementById('menuToggle').addEventListener('click', function() {
                    document.getElementById('sidebar').classList.toggle('open');
                });

                document.querySelectorAll('.sidebar-nav a').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const page = this.dataset.page;
                        if (page) navigateTo(page);
                    });
                });

                document.getElementById('closeCartSidebar').addEventListener('click', function() {
                    document.getElementById('cartSidebar').style.display = 'none';
                });

                ['searchRetentores', 'searchRolamentos', 'searchRedutores'].forEach(id => {
                    const inp = document.getElementById(id);
                    if (inp) inp.addEventListener('input', renderAllLists);
                });

                document.getElementById('btnAddRetentor').addEventListener('click', () => {
                    modalMode = 'add'; editingItemId = null; editingCategory = null;
                    createModal('Adicionar Retentor', 'retentor');
                    modalOverlay.style.display = 'flex';
                });
                document.getElementById('btnAddRolamento').addEventListener('click', () => {
                    modalMode = 'add'; editingItemId = null; editingCategory = null;
                    createModal('Adicionar Rolamento', 'rolamento');
                    modalOverlay.style.display = 'flex';
                });
                document.getElementById('btnAddRedutor').addEventListener('click', () => {
                    modalMode = 'add'; editingItemId = null; editingCategory = null;
                    createModal('Adicionar Redutor', 'redutor');
                    modalOverlay.style.display = 'flex';
                });

                document.getElementById('btnWhatsAppPage').addEventListener('click', sendWhatsApp);
                document.getElementById('btnWhatsAppSidebar').addEventListener('click', sendWhatsApp);

                document.getElementById('adminLinkFromLogin').addEventListener('click', () => {
                    const user = prompt('Usuário mestre:');
                    if (!user) return;
                    const pass = prompt('Senha mestre:');
                    if (!pass) return;
                    users = loadUsers();
                    const master = users.find(u => u.username === user && u.password === pass && u.level === 'master');
                    if (!master) { alert('Acesso negado.'); return; }
                    currentUser = { username: master.username, level: 'master' };
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    document.getElementById('userInfo').textContent = `👤 ${currentUser.username} (Mestre)`;
                    document.getElementById('sidebarAdmin').style.display = 'flex';
                    checkServerStatus();
                    initApp();
                });

                modalOverlay.addEventListener('click', function(e) {
                    if (e.target === this) this.style.display = 'none';
                });

                document.getElementById('btnCloseAdmin').addEventListener('click', () => {
                    document.getElementById('adminPanel').style.display = 'none';
                });
                document.getElementById('adminPanel').addEventListener('click', function(e) {
                    if (e.target === this) this.style.display = 'none';
                });
            });
        })();
    </script>
</body>
</html>
