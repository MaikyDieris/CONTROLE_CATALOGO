<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redutores Manager Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --glass: rgba(30, 41, 59, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px 32px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            transform: perspective(500px) rotateX(5deg) rotateY(-5deg);
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .cart-btn {
            position: relative;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Redutores Grid */
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: var(--primary);
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
        }

        .redutores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .redutor-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .redutor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--success));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .redutor-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-color: var(--primary);
        }

        .redutor-card:hover::before {
            transform: scaleX(1);
        }

        .redutor-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .info-tag {
            padding: 6px 12px;
            background: var(--surface-light);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .btn-mapear {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-mapear:hover {
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        /* Modal de Mapeamento */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .mapeamento-modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px;
            width: 95%;
            max-width: 1200px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface-light);
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .btn-close:hover {
            background: var(--danger);
            transform: rotate(90deg);
        }

        /* Container da Imagem com Pontos */
        .image-map-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 2px solid var(--border);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-map-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .image-map-container img {
            display: block;
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        .ponto-mapeamento {
            position: absolute;
            width: 28px;
            height: 28px;
            background: var(--danger);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: all 0.3s ease;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: pointPulse 2s infinite;
        }

        .ponto-mapeamento:hover {
            transform: translate(-50%, -50%) scale(1.3);
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.7);
            z-index: 100;
        }

        .ponto-mapeamento .tooltip {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .ponto-mapeamento:hover .tooltip {
            opacity: 1;
        }

        @keyframes pointPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.8); }
        }

        /* Lista de Peças Mapeadas */
        .pecas-mapeadas {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .pecas-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .peca-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface-light);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .peca-item:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .peca-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .peca-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
        }

        .peca-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .peca-code {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .btn-add-peca {
            padding: 8px 16px;
            background: var(--success);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }

        .btn-add-peca:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .btn-add-peca.added {
            background: var(--primary);
            animation: addedFlash 0.5s ease;
        }

        @keyframes addedFlash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Modo de Adição de Pontos */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
        }

        .mode-btn:hover {
            border-color: var(--primary);
        }

        /* Carrinho */
        .carrinho-panel {
            position: fixed;
            right: -400px;
            top: 0;
            bottom: 0;
            width: 400px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 999;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
        }

        .carrinho-panel.open {
            right: 0;
        }

        .carrinho-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .carrinho-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .carrinho-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .btn-whatsapp {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .redutores-grid {
                grid-template-columns: 1fr;
            }
            .carrinho-panel {
                width: 100%;
                right: -100%;
            }
            .mapeamento-modal {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">
                    <i class="fas fa-gears"></i>
                </div>
                <div class="header-title">
                    <h1>Redutores Manager Pro</h1>
                    <p>Mapeamento inteligente de peças</p>
                </div>
            </div>
            <button class="cart-btn" onclick="toggleCarrinho()">
                <i class="fas fa-shopping-cart"></i> Carrinho
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </header>

        <!-- Redutores Grid -->
        <div class="section-title">
            <i class="fas fa-cubes"></i>
            <span>Redutores Disponíveis</span>
        </div>
        <div class="redutores-grid" id="redutoresGrid"></div>
    </div>

    <!-- Modal de Mapeamento -->
    <div class="modal-overlay" id="mapeamentoModal">
        <div class="mapeamento-modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-map-pin" style="color: var(--primary);"></i>
                    <span id="modalRedutorName">Mapeamento do Redutor</span>
                </div>
                <button class="btn-close" onclick="closeMapeamento()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Modo de operação -->
            <div class="mode-selector">
                <button class="mode-btn active" id="modeView" onclick="setMode('view')">
                    <i class="fas fa-eye"></i> Visualizar
                </button>
                <button class="mode-btn" id="modeAdd" onclick="setMode('add')">
                    <i class="fas fa-plus-circle"></i> Adicionar Ponto
                </button>
            </div>

            <!-- Container da Imagem -->
            <div class="image-map-wrapper">
                <div class="image-map-container" id="imageMapContainer">
                    <img id="redutorImage" src="" alt="Redutor">
                    <!-- Pontos serão adicionados dinamicamente -->
                </div>
            </div>

            <!-- Lista de Peças Mapeadas -->
            <div class="pecas-mapeadas">
                <div class="pecas-title">
                    <i class="fas fa-list-check"></i>
                    <span>Peças Mapeadas</span>
                    <span style="font-size: 0.75rem; color: var(--text-secondary);">
                        (Duplo clique no ponto para adicionar ao carrinho)
                    </span>
                </div>
                <div id="pecasMapeadasList">
                    <p style="color: var(--text-secondary); text-align: center; padding: 20px;">
                        Nenhuma peça mapeada ainda. Use o modo "Adicionar Ponto" para mapear.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Carrinho Panel -->
    <div class="carrinho-panel" id="carrinhoPanel">
        <div class="carrinho-header">
            <h3><i class="fas fa-shopping-cart"></i> Carrinho</h3>
            <button class="btn-close" onclick="toggleCarrinho()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="carrinho-items" id="carrinhoItems">
            <p style="color: var(--text-secondary); text-align: center; padding: 40px 20px;">
                <i class="fas fa-box-open" style="font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.5;"></i>
                Seu carrinho está vazio
            </p>
        </div>
        <div class="carrinho-footer">
            <div style="margin-bottom: 12px; font-weight: 600;">
                Total: <span id="carrinhoTotal">0</span> itens
            </div>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <i class="fab fa-whatsapp"></i> Enviar via WhatsApp
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        // ============================================================
        // DADOS E ESTADO
        // ============================================================
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvyfBtZ2VN6w_xJL2BHEUNHfXiESTGlM-pPHpvx8RgP8scaAO_E76FwGJMzXG2aHgd/exec';
        const SHEET_ID = '1MEghTuBZnbkddvgNsJ2Mi2DwebHyMmGG-Xir4TGtQm0';

        let currentMode = 'view';
        let currentRedutorId = null;
        let currentRedutor = null;
        let pontosMapeados = [];
        let carrinho = [];
        let redutores = [];

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            await carregarRedutores();
            await carregarCarrinho();
            renderizarRedutores();
            atualizarCarrinho();
        });

        // ============================================================
        // CARREGAR DADOS DO GOOGLE SHEETS
        // ============================================================
        async function carregarRedutores() {
            try {
                const response = await fetch(`${APP_SCRIPT_URL}?action=load&sheetId=${SHEET_ID}&t=${Date.now()}`);
                const data = await response.json();
                if (data.status === 'ok' && data.data) {
                    redutores = data.data.reducers || [];
                    console.log('✅ Redutores carregados:', redutores.length);
                }
            } catch (error) {
                console.error('Erro ao carregar redutores:', error);
                // Dados de exemplo para demonstração
                redutores = [
                    {
                        id: 1,
                        name: 'Redutor Planetário A10',
                        manufacturer: 'SEW',
                        location: 'Esteira Transportadora',
                        bearings: ['Rolamento 6001', 'Rolamento 6203'],
                        retainers: ['Retentor 20x35x7', 'Retentor 30x45x8']
                    },
                    {
                        id: 2,
                        name: 'Redutor WEG Cestari C06',
                        manufacturer: 'WEG Cestari',
                        location: 'Transportador de Correia',
                        bearings: ['Rolamento 6204', 'Rolamento 6205'],
                        retainers: ['Retentor 25x40x7', 'Retentor 35x50x10']
                    }
                ];
            }
        }

        async function carregarCarrinho() {
            try {
                const response = await fetch(`${APP_SCRIPT_URL}?action=load&sheetId=${SHEET_ID}&t=${Date.now()}`);
                const data = await response.json();
                if (data.status === 'ok' && data.data) {
                    carrinho = data.data.cart || [];
                }
            } catch (error) {
                console.error('Erro ao carregar carrinho:', error);
                carrinho = [];
            }
        }

        async function salvarDados() {
            try {
                const formData = new FormData();
                formData.append('action', 'save');
                formData.append('sheetId', SHEET_ID);
                formData.append('data', JSON.stringify({
                    retainers: [],
                    bearings: [],
                    reducers: redutores,
                    cart: carrinho,
                    nextRetainerId: 1,
                    nextBearingId: 1,
                    nextReducerId: redutores.length + 1
                }));

                const response = await fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                console.log('✅ Dados salvos:', result);
            } catch (error) {
                console.error('Erro ao salvar:', error);
            }
        }

        // ============================================================
        // RENDERIZAR REDUTORES
        // ============================================================
        function renderizarRedutores() {
            const grid = document.getElementById('redutoresGrid');
            
            if (redutores.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                        <i class="fas fa-cube" style="font-size: 4rem; display: block; margin-bottom: 16px; opacity: 0.3;"></i>
                        <p>Nenhum redutor cadastrado ainda.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = redutores.map(redutor => `
                <div class="redutor-card" onclick="abrirMapeamento(${redutor.id})">
                    <div class="card-header">
                        <div class="card-icon">
                            <i class="fas fa-gear"></i>
                        </div>
                        <div>
                            <div class="card-title">${escapeHtml(redutor.name)}</div>
                            <div class="card-subtitle">${escapeHtml(redutor.manufacturer)}</div>
                        </div>
                    </div>
                    <div class="card-info">
                        <span class="info-tag">
                            <i class="fas fa-map-marker-alt"></i> ${escapeHtml(redutor.location)}
                        </span>
                        <span class="info-tag">
                            <i class="fas fa-cog"></i> ${(redutor.bearings || []).length} rolamentos
                        </span>
                        <span class="info-tag">
                            <i class="fas fa-oil-can"></i> ${(redutor.retainers || []).length} retentores
                        </span>
                    </div>
                    <button class="btn-mapear" onclick="event.stopPropagation(); abrirMapeamento(${redutor.id})">
                        <i class="fas fa-map-pin"></i> Mapear Peças
                    </button>
                </div>
            `).join('');
        }

        // ============================================================
        // MAPEAMENTO DO REDUTOR
        // ============================================================
        function abrirMapeamento(redutorId) {
            currentRedutorId = redutorId;
            currentRedutor = redutores.find(r => r.id === redutorId);
            
            if (!currentRedutor) {
                alert('Redutor não encontrado!');
                return;
            }

            document.getElementById('modalRedutorName').textContent = currentRedutor.name;
            
            // Carregar imagem do redutor (usando placeholder ou imagem personalizada)
            const img = document.getElementById('redutorImage');
            img.src = currentRedutor.imageUrl || `https://via.placeholder.com/800x600/1e293b/60a5fa?text=${encodeURIComponent(currentRedutor.name)}`;
            
            // Carregar pontos mapeados salvos
            pontosMapeados = currentRedutor.mapeamento || [];
            
            renderizarPontos();
            renderizarListaPecas();
            
            document.getElementById('mapeamentoModal').classList.add('active');
            setMode('view');
        }

        function closeMapeamento() {
            document.getElementById('mapeamentoModal').classList.remove('active');
            
            // Salvar pontos mapeados no redutor
            if (currentRedutor) {
                currentRedutor.mapeamento = pontosMapeados;
                const index = redutores.findIndex(r => r.id === currentRedutor.id);
                if (index !== -1) {
                    redutores[index] = currentRedutor;
                }
                salvarDados();
            }
        }

        function setMode(mode) {
            currentMode = mode;
            
            document.getElementById('modeView').classList.toggle('active', mode === 'view');
            document.getElementById('modeAdd').classList.toggle('active', mode === 'add');
            
            const container = document.getElementById('imageMapContainer');
            
            if (mode === 'add') {
                container.style.cursor = 'crosshair';
                container.addEventListener('click', adicionarPonto);
            } else {
                container.style.cursor = 'default';
                container.removeEventListener('click', adicionarPonto);
            }
        }

        function adicionarPonto(event) {
            if (currentMode !== 'add') return;
            
            const container = document.getElementById('imageMapContainer');
            const rect = container.getBoundingClientRect();
            
            const x = ((event.clientX - rect.left) / rect.width * 100).toFixed(1);
            const y = ((event.clientY - rect.top) / rect.height * 100).toFixed(1);
            
            const nomePeca = prompt('Nome da peça:', 'Peça ' + (pontosMapeados.length + 1));
            if (!nomePeca) return;
            
            const codigoPeca = prompt('Código da peça:', 'COD-' + (pontosMapeados.length + 1));
            if (!codigoPeca) return;
            
            pontosMapeados.push({
                id: Date.now(),
                nome: nomePeca,
                codigo: codigoPeca,
                x: parseFloat(x),
                y: parseFloat(y)
            });
            
            renderizarPontos();
            renderizarListaPecas();
            setMode('view');
            
            // Salvar automaticamente
            if (currentRedutor) {
                currentRedutor.mapeamento = pontosMapeados;
                salvarDados();
            }
        }

        function renderizarPontos() {
            const container = document.getElementById('imageMapContainer');
            
            // Remover pontos existentes
            container.querySelectorAll('.ponto-mapeamento').forEach(el => el.remove());
            
            // Adicionar novos pontos
            pontosMapeados.forEach(ponto => {
                const dot = document.createElement('div');
                dot.className = 'ponto-mapeamento';
                dot.style.left = ponto.x + '%';
                dot.style.top = ponto.y + '%';
                dot.innerHTML = `
                    <div class="tooltip">
                        <strong>${escapeHtml(ponto.nome)}</strong><br>
                        <small>${escapeHtml(ponto.codigo)}</small><br>
                        <small style="color: var(--accent);">Duplo clique para adicionar</small>
                    </div>
                `;
                
                // Duplo clique para adicionar ao carrinho
                dot.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    adicionarAoCarrinho(ponto);
                });
                
                // Clique simples para editar (apenas no modo view)
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (currentMode === 'view') {
                        if (confirm(`Editar peça "${ponto.nome}"?`)) {
                            const novoNome = prompt('Nome:', ponto.nome);
                            if (novoNome) ponto.nome = novoNome;
                            const novoCodigo = prompt('Código:', ponto.codigo);
                            if (novoCodigo) ponto.codigo = novoCodigo;
                            
                            renderizarPontos();
                            renderizarListaPecas();
                            
                            if (currentRedutor) {
                                currentRedutor.mapeamento = pontosMapeados;
                                salvarDados();
                            }
                        }
                    }
                });
                
                container.appendChild(dot);
            });
        }

        function renderizarListaPecas() {
            const lista = document.getElementById('pecasMapeadasList');
            
            if (pontosMapeados.length === 0) {
                lista.innerHTML = `
                    <p style="color: var(--text-secondary); text-align: center; padding: 20px;">
                        <i class="fas fa-info-circle"></i> 
                        Nenhuma peça mapeada. Use o modo "Adicionar Ponto" para mapear.
                    </p>
                `;
                return;
            }
            
            lista.innerHTML = pontosMapeados.map((ponto, index) => `
                <div class="peca-item">
                    <div class="peca-info">
                        <div class="peca-dot"></div>
                        <div>
                            <div class="peca-name">${escapeHtml(ponto.nome)}</div>
                            <div class="peca-code">Cód: ${escapeHtml(ponto.codigo)}</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-add-peca" onclick="adicionarAoCarrinho(pontosMapeados[${index}])">
                            <i class="fas fa-cart-plus"></i> Carrinho
                        </button>
                        <button class="btn-close" style="width: 30px; height: 30px; font-size: 0.8rem;" 
                                onclick="removerPonto(${ponto.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function removerPonto(pontoId) {
            if (confirm('Remover este ponto?')) {
                pontosMapeados = pontosMapeados.filter(p => p.id !== pontoId);
                renderizarPontos();
                renderizarListaPecas();
                
                if (currentRedutor) {
                    currentRedutor.mapeamento = pontosMapeados;
                    salvarDados();
                }
            }
        }

        // ============================================================
        // CARRINHO
        // ============================================================
        function adicionarAoCarrinho(ponto) {
            const itemExistente = carrinho.find(i => 
                i.codigo === ponto.codigo && 
                i.redutorId === currentRedutorId
            );
            
            if (itemExistente) {
                itemExistente.quantidade++;
            } else {
                carrinho.push({
                    categoria: 'peca_mapeada',
                    itemId: ponto.id,
                    codigo: ponto.codigo,
                    nome: ponto.nome,
                    redutorId: currentRedutorId,
                    redutorName: currentRedutor ? currentRedutor.name : '',
                    quantidade: 1
                });
            }
            
            atualizarCarrinho();
            salvarDados();
            
            // Feedback visual
            const btn = event.target.closest('.btn-add-peca');
            if (btn) {
                btn.classList.add('added');
                setTimeout(() => btn.classList.remove('added'), 500);
            }
            
            // Animação no badge
            const badge = document.getElementById('cartCount');
            badge.style.transform = 'scale(1.3)';
            setTimeout(() => badge.style.transform = 'scale(1)', 200);
        }

        function atualizarCarrinho() {
            const count = carrinho.reduce((sum, item) => sum + item.quantidade, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('carrinhoTotal').textContent = count;
            
            const itemsContainer = document.getElementById('carrinhoItems');
            
            if (carrinho.length === 0) {
                itemsContainer.innerHTML = `
                    <p style="color: var(--text-secondary); text-align: center; padding: 40px 20px;">
                        <i class="fas fa-box-open" style="font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.5;"></i>
                        Seu carrinho está vazio
                    </p>
                `;
                return;
            }
            
            itemsContainer.innerHTML = carrinho.map((item, index) => `
                <div class="peca-item" style="margin-bottom: 12px;">
                    <div class="peca-info">
                        <div>
                            <div class="peca-name">${escapeHtml(item.nome)}</div>
                            <div class="peca-code">Cód: ${escapeHtml(item.codigo)}</div>
                            <div style="font-size: 0.7rem; color: var(--text-secondary);">
                                Redutor: ${escapeHtml(item.redutorName)}
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" value="${item.quantidade}" min="1" 
                               style="width: 50px; padding: 4px; background: var(--surface-light); 
                                      border: 1px solid var(--border); border-radius: 6px; color: var(--text); text-align: center;"
                               onchange="alterarQuantidade(${index}, this.value)">
                        <button class="btn-close" style="width: 30px; height: 30px; font-size: 0.8rem;" 
                                onclick="removerDoCarrinho(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function alterarQuantidade(index, quantidade) {
            const qtd = parseInt(quantidade);
            if (qtd > 0) {
                carrinho[index].quantidade = qtd;
                atualizarCarrinho();
                salvarDados();
            }
        }

        function removerDoCarrinho(index) {
            if (confirm('Remover este item do carrinho?')) {
                carrinho.splice(index, 1);
                atualizarCarrinho();
                salvarDados();
            }
        }

        function toggleCarrinho() {
            document.getElementById('carrinhoPanel').classList.toggle('open');
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) {
                alert('Carrinho vazio!');
                return;
            }
            
            let mensagem = '🛒 *Lista de Peças para Compra*\n\n';
            
            // Agrupar por redutor
            const agrupado = {};
            carrinho.forEach(item => {
                if (!agrupado[item.redutorName]) {
                    agrupado[item.redutorName] = [];
                }
                agrupado[item.redutorName].push(item);
            });
            
            for (const [redutor, itens] of Object.entries(agrupado)) {
                mensagem += `📦 *${redutor}*\n`;
                itens.forEach(item => {
                    mensagem += `  • ${item.nome} (Cód: ${item.codigo}) - Qtd: ${item.quantidade}\n`;
                });
                mensagem += '\n';
            }
            
            mensagem += `📊 *Total de itens: ${carrinho.reduce((s, i) => s + i.quantidade, 0)}*`;
            
            const url = `https://wa.me/?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }

        // ============================================================
        // UTILITÁRIOS
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // FECHAR MODAL COM ESC
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('mapeamentoModal').classList.contains('active')) {
                    closeMapeamento();
                }
                if (document.getElementById('carrinhoPanel').classList.contains('open')) {
                    toggleCarrinho();
                }
            }
        });

        // Fechar modal clicando fora
        document.getElementById('mapeamentoModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeMapeamento();
            }
        });
    </script>
</body>
</html>
