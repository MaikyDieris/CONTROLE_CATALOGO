            // ============================================================
            // MOSTRADOR DE STATUS

            async function checkServerStatus() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                try {
                    const resp = await fetch(`${APP_SCRIPT_URL}?action=ping&t=${Date.now()}`);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    if (data.status === 'ok') {
                        dot.className = 'status-dot online';
                        text.textContent = 'Online';
                    } else {
                        throw new Error(data.message || 'Resposta inválida');
                    }
                } catch (e) {
                    dot.className = 'status-dot offline';
                    text.textContent = 'Offline';
                    console.warn('Erro ao verificar servidor:', e.message);
                }
            }

            setInterval(checkServerStatus, 30000);
            document.addEventListener('DOMContentLoaded', checkServerStatus);

                    const resp = await fetch(`${APP_SCRIPT_URL}?action=load&sheetId=${SHEET_ID}&t=${Date.now()}`);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const result = await resp.json();
                    if (result.status === 'ok') {
                        console.log('✅ Dados carregados com sucesso');
                        return result.data;
                    } else {
                        console.error('❌ Erro ao carregar dados:', result.message);
                        return null;
                    }
                } catch (e) {
                    console.error('❌ Falha na requisição de load:', e);
                    return null;
                }
            }

            async function saveDataToSheet(data) {
                try {
                    console.log('💾 Salvando dados na planilha...', data);
                    const payload = {
                        action: 'save',
                        sheetId: SHEET_ID,
                        data: JSON.stringify(data)
                    };
                    const formData = new FormData();
                    for (let key in payload) {
                        formData.append(key, payload[key]);
                    }
                    const resp = await fetch(APP_SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const result = await resp.json();
                    if (result.status === 'ok') {
                        console.log('✅ Dados salvos com sucesso!');
                        return true;
                    } else {
                        console.error('❌ Erro ao salvar:', result.message);
                        alert('Erro ao salvar: ' + result.message);
                        return false;

                if (!users.some(u => u.username === 'visitante')) users.push({ username: 'visitante', password: 'visitante123', level: 'user' });

                return users;
            }
            let users = loadUsers();

            // ============================================================
            // FUNÇÕES DE UTILIDADE
            // ============================================================
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getCurrentList() {
                return activeCategory === 'retentor' ? retainers :
                       activeCategory === 'rolamento' ? bearings :
                       reducers;
            }

            function getItemById(id) {
                return getCurrentList().find(i => i.id === id);
            }

            function cartTotalQty() {
                return cart.reduce((s, i) => s + i.quantity, 0);
            }

            function cleanCart() {
                cart = cart.filter(i => {
                    if (i.category === 'retentor') return retainers.some(r => r.id === i.itemId);
                    if (i.category === 'rolamento') return bearings.some(b => b.id === i.itemId);
                    if (i.category === 'redutor') return reducers.some(rd => rd.id === i.itemId);
                    return false;
                });
            }

            function generateRetentorName(m) {
                let c = m.replace(/mm/gi, '').trim().replace(/\s*x\s*/g, 'x').replace(/\s+/g, '');
                return 'Retentor ' + (c || 'sem medida');
            }

            function isMaster() {
                return currentUser && currentUser.level === 'master';
            }

            // ============================================================
            // RENDERIZAÇÃO
            // ============================================================
            function renderItems() {
                if (!panelOpen) return;
                const list = getCurrentList();
                const master = isMaster();
                const filtered = list.filter(item => {
                    const q = searchQuery.toLowerCase();
                    if (activeCategory === 'redutor') {
                        return item.name.toLowerCase().includes(q) ||
                               item.manufacturer.toLowerCase().includes(q) ||
                               item.location.toLowerCase().includes(q) ||
                               item.bearings.some(b => b.toLowerCase().includes(q)) ||
                               item.retainers.some(r => r.toLowerCase().includes(q));
                    } else {
                        return item.name.toLowerCase().includes(q) ||
                               item.measures.toLowerCase().includes(q);
                    }
                });
                if (!filtered.length) {
                    itemsArea.innerHTML = `<div class="no-results">🔍 Nenhum resultado para "<strong>${escapeHtml(searchQuery)}</strong>"</div>`;
                    return;
                }
                itemsArea.innerHTML = filtered.map(item => {
                    const disabled = master ? '' : 'disabled';
                    if (activeCategory === 'redutor') {
                        return `<div class="item-card">
                            <div class="card-name card-name-clickable" onclick="window._openReducerDetail(${item.id})">${escapeHtml(item.name)}</div>
                            <div class="card-info">🏭 ${escapeHtml(item.manufacturer)}</div>
                            <div class="card-info">📍 ${escapeHtml(item.location)}</div>
                            <div class="card-components"><span class="component-badge">⚙️ ${item.bearings.length} rol.</span><span class="component-badge">🔩 ${item.retainers.length} ret.</span></div>
                            <div style="font-size:0.75rem; color:var(--text-secondary);">⚙️ ${item.bearings.join(', ')}<br>🔩 ${item.retainers.join(', ')}</div>
                            <div class="card-actions">
                                <button class="btn btn-cart" data-action="add" data-id="${item.id}">🛒 Carrinho</button>
                                ${master ? `<button class="btn btn-edit" data-action="edit" data-id="${item.id}">✏️ Editar</button><button class="btn btn-remove" data-action="remove" data-id="${item.id}">🗑️ Remover</button>` : ''}
                            </div></div>`;
                    } else {
                        return `<div class="item-card"><div class="card-name">${escapeHtml(item.name)}</div><span class="card-info">📏 ${escapeHtml(item.measures)}</span><div class="card-actions"><button class="btn btn-cart" data-action="add" data-id="${item.id}">🛒 Carrinho</button>${master ? `<button class="btn btn-edit" data-action="edit" data-id="${item.id}">✏️ Editar</button><button class="btn btn-remove" data-action="remove" data-id="${item.id}">🗑️ Remover</button>` : ''}</div></div>`;
                    }
                }).join('');
                itemsArea.querySelectorAll('.btn').forEach(btn => {
                    if (btn.disabled) return;
                    btn.addEventListener('click', function(e) {
                        const action = this.dataset.action;
                        const id = parseInt(this.dataset.id);
                        if (action === 'add') addToCart(id);
                        else if (action === 'edit') openEditModal(id);
                        else if (action === 'remove') removeItem(id);
                    });
                });
            }

            function renderCart() {
                cleanCart();
                const total = cartTotalQty();
                cartBadge.textContent = total;
                cartTotal.textContent = `Total de itens: ${total}`;
                btnWhatsAppTop.disabled = total === 0;
                if (!cart.length) {
                    cartItemsEl.innerHTML = `<div class="cart-empty"><span class="icon">📦</span>Seu carrinho está vazio</div>`;
                    return;
                }
                cartItemsEl.innerHTML = cart.map(ci => {
                    let item;
                    if (ci.category === 'retentor') item = retainers.find(r => r.id === ci.itemId);
                    else if (ci.category === 'rolamento') item = bearings.find(b => b.id === ci.itemId);
                    else item = reducers.find(rd => rd.id === ci.itemId);
                    if (!item) return '';
                    let measuresText = '';
                    if (ci.category === 'retentor' || ci.category === 'rolamento') {
                        measuresText = `📏 ${escapeHtml(item.measures)}`;
                    } else {
                        measuresText = `🏭 ${escapeHtml(item.manufacturer)} | 📍 ${escapeHtml(item.location)}<br>⚙️ ${item.bearings.join(', ')}<br>🔩 ${item.retainers.join(', ')}`;
                    }
                    return `<div class="cart-item"><div class="cart-item-name">${escapeHtml(item.name)}</div><div class="cart-item-measures">${measuresText}</div><div class="cart-item-controls"><input type="number" class="qty-input" value="${ci.quantity}" min="1" data-category="${ci.category}" data-id="${ci.itemId}"><button class="btn-remove-cart" data-category="${ci.category}" data-id="${ci.itemId}">🗑️ Remover</button></div></div>`;
                }).join('');
                cartItemsEl.querySelectorAll('.qty-input').forEach(input => {
                    input.addEventListener('change', function() {
                        const cat = this.dataset.category;
                        const id = parseInt(this.dataset.id);
                        let qty = parseInt(this.value);
                        if (isNaN(qty) || qty < 1) { qty = 1; this.value = 1; }
                        updateCartQty(cat, id, qty);
                    });
                });
                cartItemsEl.querySelectorAll('.btn-remove-cart').forEach(btn => {
                    btn.addEventListener('click', () => removeFromCart(btn.dataset.category, parseInt(btn.dataset.id)));
                });
            }

            function pulseBadge() {
                cartBadge.style.transform = 'scale(1.3)';

            }

            // ============================================================
            // AÇÕES (com chamada explícita ao saveData e verificação)
            // ============================================================
            async function addToCart(itemId) {
                const existing = cart.find(i => i.itemId === itemId && i.category === activeCategory);
                if (existing) existing.quantity++;
                else cart.push({ category: activeCategory, itemId, quantity: 1 });
                renderCart();
                const saved = await saveData();
                if (saved) {
                    console.log('✅ Carrinho salvo com sucesso.');
                } else {
                    alert('⚠️ Erro ao salvar o carrinho. Os dados podem não estar na planilha.');
                }
                pulseBadge();
            }

            async function updateCartQty(cat, id, qty) {
                const item = cart.find(i => i.category === cat && i.itemId === id);
                if (item) item.quantity = Math.max(1, qty);
                renderCart();
                await saveData();
            }

            async function removeFromCart(cat, id) {
                cart = cart.filter(i => !(i.category === cat && i.itemId === id));
                renderCart();
                await saveData();
            }

            async function removeItem(itemId) {
                if (!isMaster()) return;
                const item = getItemById(itemId);
                if (!item || !confirm(`Remover "${item.name}"?`)) return;
                if (activeCategory === 'retentor') retainers = retainers.filter(i => i.id !== itemId);
                else if (activeCategory === 'rolamento') bearings = bearings.filter(i => i.id !== itemId);
                else reducers = reducers.filter(i => i.id !== itemId);
                cart = cart.filter(i => !(i.category === activeCategory && i.itemId === itemId));
                if (panelOpen) renderItems();
                renderCart();
                const saved = await saveData();
                if (!saved) alert('⚠️ Erro ao salvar a remoção. Verifique a planilha.');
            }

            function openReducerDetail(item) {
                reducerDetailTitle.textContent = item.name;
                let html = `
                    <p><strong>Fabricante:</strong> ${escapeHtml(item.manufacturer)}</p>
                    <p><strong>Local:</strong> ${escapeHtml(item.location)}</p>
                    <h4 style="margin-top:16px;">⚙️ Rolamentos utilizados (${item.bearings.length})</h4>
                    <ul style="margin-left:20px;">
                        ${item.bearings.map(b => `<li>${escapeHtml(b)}</li>`).join('')}
                    </ul>
                    <h4 style="margin-top:12px;">🔩 Retentores utilizados (${item.retainers.length})</h4>
                    <ul style="margin-left:20px;">
                        ${item.retainers.map(r => `<li>${escapeHtml(r)}</li>`).join('')}
                    </ul>
                `;
                reducerDetailContent.innerHTML = html;
                reducerDetailModal.style.display = 'flex';
            }

            window._openReducerDetail = function(id) {
                const item = reducers.find(r => r.id === id);
                if (item) openReducerDetail(item);
            };

            function sendWhatsApp() {
                cleanCart();
                if (!cart.length) { alert('Carrinho vazio.'); return; }
                let msg = '🛒 *Carrinho de Itens*\n\n';
                cart.forEach((ci, idx) => {
                    let item;
                    if (ci.category === 'retentor') item = retainers.find(r => r.id === ci.itemId);
                    else if (ci.category === 'rolamento') item = bearings.find(b => b.id === ci.itemId);
                    else item = reducers.find(rd => rd.id === ci.itemId);
                    if (!item) return;
                    msg += `📦 *${item.name}*\n`;
                    if (ci.category === 'redutor') {
                        msg += `   Fabricante: ${item.manufacturer}\n   Local: ${item.location}\n   Rolamentos: ${item.bearings.join(', ')}\n   Retentores: ${item.retainers.join(', ')}\n`;
                    } else {
                        msg += `   Medidas: ${item.measures}\n`;
                    }
                    msg += `   Quantidade: ${ci.quantity}\n`;
                    if (idx < cart.length - 1) msg += '\n';
                });
                msg += `\n📊 *Total de itens: ${cartTotalQty()}*`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }

            // ============================================================
            // MODAL ADICIONAR/EDITAR (com salvamento garantido)
            // ============================================================
            function openAddModal() {
                if (!isMaster()) return;
                modalMode = 'add';
                editingItemId = null;
                createModal('Adicionar Item');
                categorySelect.value = 'retentor';
                categorySelect.disabled = false;
                toggleModalFields('retentor');
                inputMeasuresRet.value = '';
                updateNamePreview();
                modalOverlay.style.display = 'flex';
                inputMeasuresRet.focus();
            }

            function openEditModal(itemId) {
                if (!isMaster()) return;
                const item = getItemById(itemId);
                if (!item) return;
                modalMode = 'edit';
                editingItemId = itemId;
                createModal('Editar Item');
                categorySelect.value = activeCategory;
                categorySelect.disabled = true;
                if (activeCategory === 'retentor') {
                    toggleModalFields('retentor');
                    inputMeasuresRet.value = item.measures;
                    updateNamePreview();
                } else if (activeCategory === 'rolamento') {
                    toggleModalFields('rolamento');
                    inputNameRol.value = item.name;
                    inputMeasuresRol.value = item.measures;
                } else {
                    toggleModalFields('redutor');
                    inputRedutorName.value = item.name;
                    inputFabricante.value = item.manufacturer;
                    inputLocal.value = item.location;
                    inputRolamentosAssoc.value = item.bearings.join(', ');
                    inputRetentoresAssoc.value = item.retainers.join(', ');
                }
                modalOverlay.style.display = 'flex';
                if (activeCategory === 'retentor') inputMeasuresRet.focus();
                else if (activeCategory === 'rolamento') inputNameRol.focus();
                else inputRedutorName.focus();
            }

            let categorySelect, retentorFields, rolamentoFields, redutorFields;
            let inputMeasuresRet, inputNameRol, inputMeasuresRol;
            let inputRedutorName, inputFabricante, inputLocal;
            let inputRolamentosAssoc, inputRetentoresAssoc;
            let namePreviewText, btnSaveModal, btnCancelModal;

            function createModal(title) {
                modalOverlay.innerHTML = `<div class="modal"><h3>${title}</h3><div class="form-group"><label for="categorySelect">Tipo</label><select id="categorySelect"><option value="retentor">Retentor</option><option value="rolamento">Rolamento</option><option value="redutor">Redutor</option></select></div><div id="retentorFields"><div class="name-preview">📌 Nome gerado: <strong id="namePreviewText">Retentor ...</strong></div><div class="form-group"><label for="inputMeasuresRet">Medida</label><input type="text" id="inputMeasuresRet" placeholder="Ex: 20 x 35 x 7 mm" autocomplete="off"></div></div><div id="rolamentoFields" style="display:none;"><div class="form-group"><label for="inputNameRol">Nome do rolamento</label><input type="text" id="inputNameRol" autocomplete="off"></div><div class="form-group"><label for="inputMeasuresRol">Diâmetro externo x Diâmetro interno</label><input type="text" id="inputMeasuresRol" autocomplete="off"></div></div><div id="redutorFields" style="display:none;"><div class="form-group"><label for="inputRedutorName">Nome do redutor</label><input type="text" id="inputRedutorName"></div><div class="form-group"><label for="inputFabricante">Fabricante</label><input type="text" id="inputFabricante"></div><div class="form-group"><label for="inputLocal">Local de aplicação</label><input type="text" id="inputLocal"></div><div class="form-group"><label for="inputRolamentosAssoc">Rolamentos associados</label><textarea id="inputRolamentosAssoc"></textarea></div><div class="form-group"><label for="inputRetentoresAssoc">Retentores associados</label><textarea id="inputRetentoresAssoc"></textarea></div></div><div class="modal-actions"><button class="btn-cancel" id="btnCancel">Cancelar</button><button class="btn-save" id="btnSave">💾 Salvar</button></div></div>`;
                categorySelect = document.getElementById('categorySelect');
                retentorFields = document.getElementById('retentorFields');
                rolamentoFields = document.getElementById('rolamentoFields');
                redutorFields = document.getElementById('redutorFields');
                inputMeasuresRet = document.getElementById('inputMeasuresRet');
                inputNameRol = document.getElementById('inputNameRol');
                inputMeasuresRol = document.getElementById('inputMeasuresRol');
                inputRedutorName = document.getElementById('inputRedutorName');
                inputFabricante = document.getElementById('inputFabricante');
                inputLocal = document.getElementById('inputLocal');
                inputRolamentosAssoc = document.getElementById('inputRolamentosAssoc');
                inputRetentoresAssoc = document.getElementById('inputRetentoresAssoc');
                namePreviewText = document.getElementById('namePreviewText');
                btnSaveModal = document.getElementById('btnSave');
                btnCancelModal = document.getElementById('btnCancel');
                btnCancelModal.addEventListener('click', closeModal);
                btnSaveModal.addEventListener('click', saveModal);
                categorySelect.addEventListener('change', function() {
                    toggleModalFields(this.value);
                    if (this.value === 'retentor') {
                        updateNamePreview();
                        inputMeasuresRet.focus();
                    } else if (this.value === 'rolamento') inputNameRol.focus();
                    else inputRedutorName.focus();
                });
                inputMeasuresRet.addEventListener('input', updateNamePreview);
                [inputMeasuresRet, inputNameRol, inputMeasuresRol, inputRedutorName, inputFabricante, inputLocal].forEach(inp => {
                    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); saveModal(); } });
                });
            }

            function toggleModalFields(cat) {
                retentorFields.style.display = cat === 'retentor' ? 'block' : 'none';
                rolamentoFields.style.display = cat === 'rolamento' ? 'block' : 'none';
                redutorFields.style.display = cat === 'redutor' ? 'block' : 'none';
            }

            function closeModal() {
                modalOverlay.style.display = 'none';
                editingItemId = null;
                modalMode = 'add';
            }

            function updateNamePreview() {
                if (namePreviewText) {
                    const m = inputMeasuresRet.value.trim();
                    namePreviewText.textContent = m ? generateRetentorName(m) : 'Retentor ...';
                }
            }

            async function saveModal() {
                if (!isMaster()) return;
                const cat = categorySelect.value;
                let saved = false;
                try {
                    if (cat === 'retentor') {
                        const measures = inputMeasuresRet.value.trim();
                        if (!measures) { alert('Informe a medida.'); return; }
                        const name = generateRetentorName(measures);
                        if (modalMode === 'add') {
                            retainers.push({ id: nextRetainerId++, name, measures });
                        } else {
                            const item = getItemById(editingItemId);
                            if (item) { item.name = name; item.measures = measures; }
                        }
                    } else if (cat === 'rolamento') {
                        const name = inputNameRol.value.trim();
                        const measures = inputMeasuresRol.value.trim();
                        if (!name || !measures) { alert('Preencha todos os campos.'); return; }
                        if (modalMode === 'add') {
                            bearings.push({ id: nextBearingId++, name, measures });
                        } else {
                            const item = getItemById(editingItemId);
                            if (item) { item.name = name; item.measures = measures; }
                        }
                    } else {
                        const name = inputRedutorName.value.trim();
                        const manufacturer = inputFabricante.value.trim();
                        const location = inputLocal.value.trim();
                        const blist = inputRolamentosAssoc.value.split(',').map(s => s.trim()).filter(s => s);
                        const rlist = inputRetentoresAssoc.value.split(',').map(s => s.trim()).filter(s => s);
                        if (!name || !manufacturer || !location) { alert('Preencha nome, fabricante e local.'); return; }
                        if (modalMode === 'add') {
                            reducers.push({ id: nextReducerId++, name, manufacturer, location, bearings: blist, retainers: rlist });
                        } else {
                            const item = getItemById(editingItemId);
                            if (item) { item.name = name; item.manufacturer = manufacturer; item.location = location; item.bearings = blist; item.retainers = rlist; }
                        }
                    }
                    closeModal();
                    if (panelOpen) renderItems();
                    renderCart();
                    saved = await saveData();
                    if (saved) {
                        console.log('✅ Item salvo com sucesso na planilha.');
                    } else {
                        alert('⚠️ Item adicionado localmente, mas não foi salvo na planilha. Verifique a conexão.');
                    }
                } catch (e) {
                    console.error('❌ Erro ao salvar modal:', e);
                    alert('Erro ao salvar: ' + e.message);
                }
            }

            // ============================================================
            // INTERFACE
            // ============================================================
            function switchCategory(cat) {
                if (activeCategory === cat) return;
                activeCategory = cat;
                tabRetentor.classList.toggle('active', cat === 'retentor');
                tabRolamento.classList.toggle('active', cat === 'rolamento');
                tabRedutor.classList.toggle('active', cat === 'redutor');
                searchInput.placeholder = cat === 'retentor' ? 'Pesquisar retentor...' :
                                          cat === 'rolamento' ? 'Pesquisar rolamento...' :
                                          'Pesquisar redutor...';
                searchQuery = '';
                searchInput.value = '';
                panelTitle.textContent = cat === 'retentor' ? '📋 Retentores' :
                                         cat === 'rolamento' ? '📋 Rolamentos' :
                                         '📋 Redutores';
                if (panelOpen) renderItems();
            }

            function openPanel() {
                leftPanel.classList.add('open');
                panelOpen = true;
                renderItems();
                centerArea.style.opacity = '0.5';
            }

            function closePanel() {
                leftPanel.classList.remove('open');
                panelOpen = false;
                centerArea.style.opacity = '1';
            }

            function toggleTheme() {
                const isDark = document.body.classList.contains('dark');
                if (isDark) {
                    document.body.classList.remove('dark');
                    document.body.classList.add('light');
                    themeToggle.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                } else {
                    document.body.classList.remove('light');
                    document.body.classList.add('dark');
                    themeToggle.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                }
            }

            function loadTheme() {
                const saved = localStorage.getItem('theme') || 'light';
                if (saved === 'dark') {
                    document.body.classList.add('dark');
                    document.body.classList.remove('light');
                    themeToggle.textContent = '☀️';
                } else {
                    document.body.classList.add('light');
                    document.body.classList.remove('dark');
                    themeToggle.textContent = '🌙';
                }
            }

            // ============================================================
            // LOGIN / LOGOUT
            // ============================================================
            function doLogin() {
                const u = loginUser.value.trim();
                const p = loginPass.value.trim();
                if (!u || !p) { loginError.textContent = 'Preencha usuário e senha.'; return; }
                users = loadUsers();
                const found = users.find(user => user.username === u && user.password === p);
                if (!found) { loginError.textContent = 'Usuário ou senha inválidos.'; return; }
                currentUser = { username: found.username, level: found.level };
                loginOverlay.style.display = 'none';
                mainSystem.style.display = 'flex';
                userInfo.textContent = `👤 ${currentUser.username} (${currentUser.level === 'master' ? 'Mestre' : 'Usuário'})`;
                btnAddTop.disabled = !isMaster();
                initApp();
            }

            function doLogout() {
                currentUser = null;
                loginOverlay.style.display = 'flex';
                mainSystem.style.display = 'none';
                loginUser.value = '';
                loginPass.value = '';
                loginError.textContent = '';
                cart = [];
                renderCart();
            }

            // ============================================================
            // ADMIN
            // ============================================================
            function renderAdminPanel() {
                users = loadUsers();
                let html = `<table class="user-table"><tr><th>Usuário</th><th>Nível</th><th>Ações</th></tr>`;
                users.forEach(u => {
                    const isMasterUser = (u.username === MASTER_USER);
                    html += `<tr><td>${escapeHtml(u.username)}</td><td>${u.level === 'master' ? 'Mestre' : 'Usuário'}</td>
                    <td>
                        <button class="btn-small btn-edit" onclick="window._renameUser('${escapeHtml(u.username)}')">Alterar nome</button>
                        <button class="btn-small btn-edit" onclick="window._resetPass('${escapeHtml(u.username)}')">Redefinir senha</button>
                        ${!isMasterUser ? `<button class="btn-small btn-remove" onclick="window._deleteUser('${escapeHtml(u.username)}')">Excluir</button>` : ''}
                    </td></tr>`;
                });
                html += '</table>';
                adminUserList.innerHTML = html;
            }

            window._renameUser = function(username) {
                const newName = prompt(`Novo nome para ${username}:`, username);
                if (newName && newName.trim()) {
                    users = loadUsers();
                    const user = users.find(u => u.username === username);
                    if (user) { user.username = newName.trim(); localStorage.setItem('app_users', JSON.stringify(users)); renderAdminPanel(); }
                }
            };
            window._resetPass = function(username) {
                const newPwd = prompt(`Nova senha para ${username}:`);
                if (newPwd) {
                    users = loadUsers();
                    const user = users.find(u => u.username === username);
                    if (user) { user.password = newPwd; localStorage.setItem('app_users', JSON.stringify(users)); alert('Senha redefinida.'); renderAdminPanel(); }
                }
            };
            window._deleteUser = function(username) {
                if (confirm(`Excluir usuário ${username}?`)) {
                    users = loadUsers();
                    users = users.filter(u => u.username !== username);
                    localStorage.setItem('app_users', JSON.stringify(users));
                    renderAdminPanel();
                }
            };

            btnAddUser.onclick = () => {
                const u = newUser.value.trim();
                const p = newPass.value.trim();
                if (!u || !p) { alert('Preencha usuário e senha.'); return; }
                users = loadUsers();
                if (users.some(user => user.username === u)) { alert('Usuário já existe.'); return; }
                users.push({ username: u, password: p, level: 'user' });
                localStorage.setItem('app_users', JSON.stringify(users));
                newUser.value = '';
                newPass.value = '';
                renderAdminPanel();
            };
            btnCloseAdmin.onclick = () => { adminPanel.style.display = 'none'; if (currentUser && currentUser.username !== MASTER_USER) currentUser = null; };
            adminPanel.addEventListener('click', function(e) { if (e.target === adminPanel) { adminPanel.style.display = 'none'; if (currentUser && currentUser.username !== MASTER_USER) currentUser = null; } });

            adminLinkFromLogin.addEventListener('click', () => {
                const user = prompt('Usuário mestre:');
                if (!user) return;
                const pass = prompt('Senha mestre:');
                if (!pass) return;
                users = loadUsers();
                const master = users.find(u => u.username === user && u.password === pass && u.level === 'master');
                if (!master) { alert('Acesso negado. Apenas o mestre pode gerenciar usuários.'); return; }
                currentUser = { username: master.username, level: 'master' };
                renderAdminPanel();
                adminPanel.style.display = 'flex';
            });

            // ============================================================
            // INICIALIZAÇÃO
            // ============================================================
            async function initApp() {
                const data = await loadDataFromSheet();
                if (data) {
                    retainers = data.retainers || [];
                    bearings = data.bearings || [];
                    reducers = data.reducers || [];
                    cart = data.cart || [];
                    nextRetainerId = data.nextRetainerId || 1;
                    nextBearingId = data.nextBearingId || 1;
                    nextReducerId = data.nextReducerId || 1;
                    console.log('📊 Dados carregados:', { retainers: retainers.length, bearings: bearings.length, reducers: reducers.length, cart: cart.length });
                } else {
                    console.log('⚠️ Nenhum dado encontrado, usando dados padrão.');
                    retainers = defaultData.retainers;
                    bearings = defaultData.bearings;
                    reducers = defaultData.reducers;
                    cart = defaultData.cart || [];
                    nextRetainerId = defaultData.nextRetainerId;
                    nextBearingId = defaultData.nextBearingId;
                    nextReducerId = defaultData.nextReducerId;
                    const saved = await saveData();
                    if (saved) console.log('✅ Dados padrão salvos com sucesso.');
                    else console.error('❌ Falha ao salvar dados padrão.');
                }
                renderCart();
                if (panelOpen) renderItems();
            }

            async function saveData() {
                const success = await saveDataToSheet({
                    retainers,
                    bearings,
                    reducers,
                    cart,
                    nextRetainerId,
                    nextBearingId,
                    nextReducerId
                });
                return success;
            }

            // ============================================================
            // EVENT LISTENERS
            // ============================================================
            btnLogin.addEventListener('click', doLogin);
            document.getElementById('btnLogout').addEventListener('click', doLogout);
            loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
            loginUser.addEventListener('keydown', e => { if (e.key === 'Enter') loginPass.focus(); });

            tabRetentor.addEventListener('click', () => switchCategory('retentor'));
            tabRolamento.addEventListener('click', () => switchCategory('rolamento'));
            tabRedutor.addEventListener('click', () => switchCategory('redutor'));

            searchInput.addEventListener('input', () => {
                searchQuery = searchInput.value;
                if (panelOpen) renderItems();
            });

            btnAddTop.addEventListener('click', openAddModal);
            btnClosePanel.addEventListener('click', closePanel);
            panelBackdrop.addEventListener('click', closePanel);
            themeToggle.addEventListener('click', toggleTheme);
            btnWhatsAppTop.addEventListener('click', sendWhatsApp);
            document.querySelector('.tab-group').addEventListener('click', function(e) {
                if (e.target.classList.contains('tab-btn') && !panelOpen) openPanel();
            });
            modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
            document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (modalOverlay.style.display === 'flex') closeModal(); else if (panelOpen) closePanel(); } });
            btnCloseReducerDetail.addEventListener('click', () => { reducerDetailModal.style.display = 'none'; });
            reducerDetailModal.addEventListener('click', function(e) { if (e.target === reducerDetailModal) reducerDetailModal.style.display = 'none'; });

            // ============================================================
            // INICIAR
            // ============================================================
            loadTheme();
            renderCart();
        })();
    </script>
</body>
</html>
